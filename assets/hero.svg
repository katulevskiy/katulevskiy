<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Daniil Katulevskiy — GPU-accelerated AI systems engineer">
  <defs>
    <pattern id="dot-grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ff8c42"/>
    </pattern>
    <linearGradient id="grid-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0.55"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="grid-mask">
      <rect x="640" y="40" width="500" height="260" fill="url(#grid-fade)"/>
    </mask>
  </defs>

  <!-- card background -->
  <rect x="1" y="1" width="1198" height="338" rx="16" fill="#0a0a0a" stroke="#ff8c42" stroke-opacity="0.18" stroke-width="1"/>

  <!-- decorative dot grid (right side, masked to fade) -->
  <rect x="640" y="40" width="500" height="260" fill="url(#dot-grid)" mask="url(#grid-mask)" opacity="0.55"/>

  <!-- amber accent vertical line on far right, pulses slowly -->
  <rect x="1140" y="80" width="2" height="180" fill="#ff8c42" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.25;0.8" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- eyebrow label -->
  <text x="60" y="80" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ff8c42" letter-spacing="3.5">DANIIL KATULEVSKIY</text>

  <!-- H1 (two lines) -->
  <text x="60" y="148" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="#f5f5f5">GPU-accelerated AI systems</text>
  <text x="60" y="198" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="#f5f5f5">engineer.</text>

  <!-- typed line: prompt + cycling phrases + blinking caret -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">
    <text x="60" y="248" fill="#ff8c42" font-weight="600">&gt;</text>

    <!-- phrase 1: visible 0–3.5s of 14s cycle -->
    <text x="80" y="248" fill="#ff8c42">
      <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.22;0.25;0.96;0.97;0.99;1" dur="14s" repeatCount="indefinite"/>
      CUDA kernels at 85% of cuBLAS.
    </text>
    <!-- phrase 2: 3.5–7s -->
    <text x="80" y="248" fill="#ff8c42" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.22;0.25;0.47;0.50;1" dur="14s" repeatCount="indefinite"/>
      Self-hosted multi-region GPU clusters.
    </text>
    <!-- phrase 3: 7–10.5s -->
    <text x="80" y="248" fill="#ff8c42" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.47;0.50;0.72;0.75;1" dur="14s" repeatCount="indefinite"/>
      Vulkan / DX12 / Metal, kernel to pixel.
    </text>
    <!-- phrase 4: 10.5–14s -->
    <text x="80" y="248" fill="#ff8c42" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.75;0.96;1" dur="14s" repeatCount="indefinite"/>
      LLM inference @ scale, LoRA finetuning.
    </text>

    <!-- caret: blinks every 1s, fixed at end-of-typical-line -->
    <rect x="465" y="234" width="9" height="2" fill="#ff8c42">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.51;0.99;1" dur="1.05s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- status line -->
  <text x="60" y="298" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="400" fill="#9ca3af">Currently · Polity Network · UCSD CS '26 → MS ML '27</text>

  <!-- corner accent ticks (bottom-right) -->
  <g stroke="#ff8c42" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <line x1="1170" y1="310" x2="1170" y2="320"/>
    <line x1="1170" y1="320" x2="1180" y2="320"/>
  </g>
</svg>
